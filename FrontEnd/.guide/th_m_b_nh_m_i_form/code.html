<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thêm bệnh mới - PlantGuard AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d7b31",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 dark:text-slate-100">
<div class="max-w-md mx-auto min-h-screen flex flex-col">
<!-- AppBar -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 text-slate-900 dark:text-slate-100 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Thêm bệnh mới</h1>
</div>
<div class="size-10"></div> <!-- Spacer for centering title if needed -->
</header>
<main class="flex-1 p-4 pb-24">
<div class="bg-white dark:bg-slate-900/50 rounded-2xl shadow-sm border border-primary/5 overflow-hidden">
<div class="p-5 space-y-6">
<!-- AppInput: Tên bệnh -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Tên bệnh <span class="text-red-500">*</span></label>
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 dark:bg-slate-800" placeholder="VD: Đốm lá vi khuẩn" type="text"/>
</div>
<!-- AppInput: Tên khoa học -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Tên khoa học</label>
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all italic placeholder:text-slate-400 dark:bg-slate-800" placeholder="VD: Xanthomonas campestris" type="text"/>
</div>
<!-- Dropdown: Mức độ nghiêm trọng -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Mức độ nghiêm trọng</label>
<div class="relative">
<select class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none transition-all dark:bg-slate-800">
<option value="thap">Thấp</option>
<option value="trung-binh">Trung bình</option>
<option value="cao">Cao</option>
<option value="nguy-hiem">Nguy hiểm</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- AppInput: Mô tả -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Mô tả chi tiết</label>
<textarea class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none dark:bg-slate-800" placeholder="Nhập thông tin tổng quan về bệnh..." rows="3"></textarea>
</div>
<!-- AppInput: Triệu chứng -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Triệu chứng nhận biết</label>
<textarea class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none dark:bg-slate-800" placeholder="Mô tả các dấu hiệu trên lá, thân, quả..." rows="3"></textarea>
</div>
<!-- AppInput: Nguyên nhân -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Nguyên nhân gây bệnh</label>
<textarea class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-primary/5 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none dark:bg-slate-800" placeholder="Do nấm, vi khuẩn hay điều kiện môi trường?" rows="3"></textarea>
</div>
<!-- Image Upload Preview (Optional addition for context) -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-primary">Hình ảnh minh họa</label>
<div class="grid grid-cols-3 gap-2">
<button class="aspect-square rounded-xl border-2 border-dashed border-primary/30 flex flex-col items-center justify-center text-primary/60 hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined">add_a_photo</span>
<span class="text-[10px] mt-1">Thêm ảnh</span>
</button>
<div class="aspect-square rounded-xl bg-slate-200 dark:bg-slate-800 overflow-hidden relative">
<img class="w-full h-full object-cover" data-alt="Close up of diseased plant leaf with yellow spots" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-QiiQNcQYiZQSXAJv6X526IGqXZgtyYdSn7kBbwnuIkd6C_ZzLRUJgaC4jT-bZn-u2oslZiyrPsudQGh84Uo6jNkz4M6UuUJ2eWvrIT4GsQJxeaSiBNpeMeGtQDWpWGw1u9ZmecwlpysuCxGwmX9e1auEvYdd2l3vkMvGH4lSTXHAV8kd07wj3qbkCPWWRtoRQoHykyYzjsp8U2B7AyTCkailktrNXXmD8oIrQVPqsooF3xhZ9tJZsPla_JBCVvvE6Saa_y1WuDau"/>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Buttons -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-primary/10 h-16"><nav class="flex justify-around items-center w-full max-w-md mx-auto h-16 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md border-t border-primary/10">
<button class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-medium">Tổng quan</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">extension</span>
<span class="text-[10px] font-medium">Models</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-primary">
<span class="material-symbols-outlined font-variation-fill-1">coronavirus</span>
<span class="text-[10px] font-bold">Bệnh</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">account_circle</span>
<span class="text-[10px] font-medium">Cá nhân</span>
</button>
</nav></footer>
</div>
</body></html>
